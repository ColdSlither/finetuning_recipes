model:
  name: "paperbd/neuraltxt-v1-135M-reasoning-base-v2"
  from_sft: false
  max_new_tokens: 640

training:
  rollout_batch_size: 8
  n_rollouts: 4
  temperature: 0.5
  eval_temperature: 0.2
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 0.000005
  num_epochs: 3
  log_every: 1
  eval_every_train_step: 5
  top_p: 0.95
  num_repeats: 3
  buffer_size: 128
  std_normalize_advantages: false

data:
  dataset: "paperbd/paper_instructions_300K-v1"
  train_split: "train"
  test_split: "test"
  train_data_size: 50000
  eval_data_size: 256
  test_batch_size: 32

loss:
  kld_weight: 0.02
  entropy_weight: 0.0
  loss_implementation: dr_grpo
  max_tokens: 256  # ~mean think+answer completion length; keeps loss at per-token scale
