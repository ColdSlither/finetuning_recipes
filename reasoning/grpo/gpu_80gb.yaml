# Larger rented-GPU run. Tuned for an 80GB GPU class instance; adjust downward
# if reward-model or generation memory is tighter than expected.
model:
  name: "paperbd/neuraltxt-135M-reasoning-base"
  from_sft: false
  max_new_tokens: 2048
  soft_threshold: 256

training:
  rollout_batch_size: 16
  n_rollouts: 8
  temperature: 0.8
  batch_size: 64
  gradient_accumulation_steps: 4
  learning_rate: 0.000001
  num_epochs: 3
  log_every: 1
  top_p: 0.95
  num_repeats: 2
  buffer_size: 512

data:
  dataset: "data/paper_instructions_300K-v2"
  train_split: "train"
  test_split: "test"
  train_data_size: 50000
  eval_data_size: 512
  test_batch_size: 16

loss:
  kld_weight: 0.02
  entropy_weight: 0.01
